        description: "Educate users on mutual fund categories and selection criteria"
        complexity: 4
        regulatory_sensitivity: High
      - id: INV-003
        name: "Direct Equity Education"
        description: "Educate on stock investing principles (not recommendations)"
        complexity: 5
        regulatory_sensitivity: High
      - id: INV-004
        name: "Portfolio Review"
        description: "Review and discuss existing portfolio composition"
        complexity: 4
        regulatory_sensitivity: High

